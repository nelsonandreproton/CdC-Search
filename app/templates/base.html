<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="description" content="Diretório de empresas de {{ target_name }} por categoria.">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">📍 {{ site_name }}</a>
      <form class="search" action="/pesquisa" method="get" role="search">
        <input type="search" name="q" placeholder="Pesquisar empresa…"
               value="{{ q|default('') }}" aria-label="Pesquisar">
        <button type="submit">Pesquisar</button>
      </form>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>{{ site_name }} — dados de fontes públicas (Google Maps, racius.com).
         Atualizado diariamente.</p>
    </div>
  </footer>
</body>
</html>
